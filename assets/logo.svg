<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F172A" stroke="url(#grad)" stroke-width="8"/>
  
  <!-- Terminal window -->
  <rect x="100" y="120" width="312" height="220" rx="12" fill="#1E293B"/>
  <rect x="100" y="120" width="312" height="32" rx="12" fill="#334155"/>
  <rect x="100" y="140" width="312" height="12" fill="#334155"/>
  
  <!-- Window buttons -->
  <circle cx="124" cy="136" r="6" fill="#EF4444"/>
  <circle cx="144" cy="136" r="6" fill="#F59E0B"/>
  <circle cx="164" cy="136" r="6" fill="#22C55E"/>
  
  <!-- Terminal text lines -->
  <rect x="120" y="168" width="180" height="8" rx="4" fill="#00D4AA" opacity="0.9"/>
  <rect x="120" y="188" width="240" height="8" rx="4" fill="#7C3AED" opacity="0.7"/>
  <rect x="120" y="208" width="120" height="8" rx="4" fill="#64748B" opacity="0.5"/>
  <rect x="120" y="228" width="200" height="8" rx="4" fill="#00D4AA" opacity="0.6"/>
  <rect x="120" y="248" width="160" height="8" rx="4" fill="#F59E0B" opacity="0.7"/>
  <rect x="120" y="268" width="220" height="8" rx="4" fill="#7C3AED" opacity="0.5"/>
  <rect x="120" y="288" width="100" height="8" rx="4" fill="#22C55E" opacity="0.8"/>
  
  <!-- Cursor blink -->
  <rect x="120" y="308" width="12" height="14" rx="2" fill="#00D4AA">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- SSH lock icon -->
  <g transform="translate(340, 380)">
    <!-- Lock body -->
    <rect x="0" y="20" width="48" height="36" rx="6" fill="url(#grad)"/>
    <!-- Lock shackle -->
    <path d="M12 20 V12 C12 0, 36 0, 36 12 V20" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="24" cy="34" r="5" fill="#0F172A"/>
    <rect x="22" y="34" width="4" height="10" rx="2" fill="#0F172A"/>
  </g>
  
  <!-- AI brain dots -->
  <g transform="translate(70, 380)">
    <circle cx="0" cy="0" r="4" fill="#00D4AA" opacity="0.8"/>
    <circle cx="16" cy="-8" r="3" fill="#7C3AED" opacity="0.7"/>
    <circle cx="32" cy="4" r="5" fill="#00D4AA" opacity="0.6"/>
    <circle cx="48" cy="-4" r="3" fill="#F59E0B" opacity="0.8"/>
    <circle cx="64" cy="8" r="4" fill="#7C3AED" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="16" y2="-8" stroke="#00D4AA" stroke-width="1.5" opacity="0.4"/>
    <line x1="16" y1="-8" x2="32" y2="4" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="4" x2="48" y2="-4" stroke="#00D4AA" stroke-width="1.5" opacity="0.4"/>
    <line x1="48" y1="-4" x2="64" y2="8" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Text: codex-ssh -->
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="url(#grad)">
    codex-ssh
  </text>
</svg>
