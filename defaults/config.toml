version = 1
# 运行时目录由程序按 data_dir 推导为 ~/.codex/ssh/run，
# 并自动创建 control/tunnels/proxies/jobs/askpass 子目录。
# password auth 通过 askpass 读取 secret_ref 对应凭据，不依赖手工交互输密。
# 默认凭据后端为 macOS Keychain（security CLI）；非 macOS 平台不提供该后端。
# allow_password_auth 的默认值是 true：fresh install 或缺省 runtime config 时可直接走 password 主路径。
# 只有用户在 ~/.codex/ssh/config.toml 显式设为 false 时，password 主路径才会被禁用。
default_auth = "agent"
default_keepalive_interval = 30
default_keepalive_count_max = 3
default_connect_timeout = 10
default_control_master = "auto"
default_control_persist = "10m"
# 前台 tunnel 默认 30 分钟后自动断开；设置为 "" 或命令行传 --ttl 0 可关闭。
default_tunnel_ttl = "30m"
default_long_job_mode = "tmux"

[security]
strict_host_key_checking = true
reuse_system_known_hosts = true
# 当前默认开启；显式关闭后将拒绝 auth=password 的 askpass 注入。
allow_password_auth = true
allow_root = true

[audit]
format = "jsonl"
capture_stdout = true
capture_stderr = true
redact_env = true
max_output_bytes = 65536
